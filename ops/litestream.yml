# Litestream configuration (loaded by the `backup` sidecar in
# docker-compose.prod.yml). Replicates /data/techinv.db continuously.
#
# Replicas:
#   1. Local file replica under /backups/techinv  — always on. Operator
#      controls the host path via BACKUP_PATH in .env (default ./backups).
#   2. Optional S3-compatible replica — only active when LITESTREAM_REPLICA_URL
#      is set in the environment. Env-var substitution leaves the field empty
#      when unset; Litestream tolerates this and just skips that replica.
#
# Retention: see `retention` under each replica. Defaults to 30 days but the
# operator can override via BACKUP_RETENTION_DAYS in .env.

dbs:
  - path: /data/techinv.db
    replicas:
      - type: file
        path: /backups/techinv
        # Snapshot cadence (full base snapshot interval). WAL frames replicate
        # continuously regardless.
        snapshot-interval: 24h
        retention: ${LITESTREAM_RETENTION_DAYS:-30}d
        retention-check-interval: 1h

      # Optional second replica. URL syntax examples:
      #   s3://bucket/path
      #   s3://bucket/path?endpoint=https://s3.us-west-002.backblazeb2.com&region=us-west-002
      # Leaving LITESTREAM_REPLICA_URL empty disables this replica.
      - type: s3
        url: ${LITESTREAM_REPLICA_URL}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        snapshot-interval: 24h
        retention: ${LITESTREAM_RETENTION_DAYS:-30}d
        retention-check-interval: 1h
