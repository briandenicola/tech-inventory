name: CI Pipeline

# Disabled — left on workflow_dispatch only so it doesn't auto-fire on
# every push/PR. Quality Gate carries the merge-blocking checks; this
# workflow's verify.sh pipeline (Playwright E2E + Docker compose) is
# the one we keep wanting to repair-then-mute. Run manually from the
# Actions tab when you want the full verify pass.
on:
  workflow_dispatch:

jobs:
  verify:
    name: Build, Test, and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 22
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install pinned gitleaks
        run: bash ./scripts/install-gitleaks.sh

      - name: Run auth token and secret scan
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            node ./scripts/check-security.mjs --diff-range "FETCH_HEAD...HEAD"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            node ./scripts/check-security.mjs --diff-range "${{ github.sha }}^!"
          else
            node ./scripts/check-security.mjs --diff-range "${{ github.event.before }}..${{ github.sha }}"
          fi

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('src/TechInventory.Web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Run verification pipeline
        run: ./scripts/verify.sh

      # Container build + push lives in `.github/workflows/release-images.yml`
      # (triggers on push-to-main, v* tags, and workflow_dispatch).
      # SBOM generation + Trivy scanning are owned by Bishop in a follow-up
      # workflow that `needs: [build-api, build-web]` from release-images.yml
      # and consumes their `outputs.image-digest`.
