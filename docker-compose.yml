# Tech Inventory — Dev Stack
#
# DATABASE NOTE: SQLite is a file, not a container. The `techinv-data` volume
# is mounted into the API container at /data/. The API writes to /data/techinv.db.
#
# Prerequisites:
#   - Docker & Docker Compose
#   - .NET 10 SDK (for local builds during dev)
#   - Node 22 + pnpm (for frontend dev/build)
#   - Task (https://taskfile.dev)
#
# Usage:
#   task up      — Start the stack
#   task down    — Stop and remove everything
#   task logs    — Tail logs
#   task ps      — Show running services

version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: src/TechInventory.Api/Dockerfile
    container_name: techinv-api
    image: techinv-api:dev
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Data Source=/data/techinv.db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""  # Empty in dev; override for local Seq/Jaeger
    volumes:
      - techinv-data:/data
      - techinv-api-tmp:/tmp
    tmpfs:
      - /tmp
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - techinv-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  web:
    build:
      context: .
      dockerfile: src/TechInventory.Web/Dockerfile
    container_name: techinv-web
    image: techinv-web:dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PUBLIC_API_URL: http://localhost:8080/api/v1
    tmpfs:
      - /tmp
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - techinv-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  techinv-net:
    name: techinv-net
    driver: bridge

volumes:
  techinv-data:
    name: techinv-data
  techinv-api-tmp:
    name: techinv-api-tmp
