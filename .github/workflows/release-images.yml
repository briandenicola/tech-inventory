name: Release Container Images

# Build + push API and Web images to GHCR on:
#   - every semver tag push (v*.*.*) -> :latest + :vX.Y.Z + :sha-<short>
#   - every main branch push          -> :latest + :main + :sha-<short>
#   - manual workflow_dispatch        -> :latest + :<inputs.tag> (optional)
#                                       + :sha-<short>
#
# Image namespace:
#   ghcr.io/briandenicola/tech-inventory-api:<tag>
#   ghcr.io/briandenicola/tech-inventory-web:<tag>
#
# :latest tracks main HEAD so the default Docker Compose IMAGE_TAG pulls the
# newest deployed build. Main builds also get :main and :sha-<short> tags for
# rolling and immutable deploys.
#
# linux/amd64 only — Brian's home server is x86_64. Adding arm64 would
# double build time for no current consumer; revisit when there is one.
#
# Provenance / SBOM attestations are intentionally off for now; Bishop
# owns container scanning + SBOM as a separate workflow.

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  # Manual trigger from the Actions UI / `gh workflow run`. Useful for
  # rebuilding `:latest` off a specific commit without cutting a fresh
  # tag (e.g. after a security patch lands and you want the home server
  # to pick it up). Optionally pass a `tag` input to also publish a
  # named tag alongside `:latest` (defaults to empty → only `:latest`
  # is pushed, alongside the always-on `:sha-<short>`).
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra image tag (e.g. hotfix-2026-05-19). Leave blank to only push :latest."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/tech-inventory

permissions:
  contents: read
  packages: write          # required to push to ghcr.io/<owner>/<image>

jobs:
  build:
    name: Build & push ${{ matrix.image.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: src/TechInventory.Api/Dockerfile
            title: Tech Inventory API
            description: ASP.NET Core 10 Web API for Tech Inventory
          - name: web
            dockerfile: src/TechInventory.Web/Dockerfile
            title: Tech Inventory Web
            description: SvelteKit PWA + nginx reverse proxy for Tech Inventory

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.image.name }}
          # Tag rules per trigger:
          #   - Tag push (v*.*.*):    :latest, :vX.Y.Z, :sha-<short>
          #   - Main push:            :latest, :main, :sha-<short>
          #   - workflow_dispatch:    :latest, :<inputs.tag>?, :sha-<short>
          #
          # `:latest` intentionally tracks main because docker-compose.yml
          # defaults IMAGE_TAG to latest for the home-server deployment.
          #
          # `github.ref_name` resolves to "vX.Y.Z" on tag push and "main"
          # on main push, so the `${{ github.ref_name }}` line covers both
          # the semver tag and the rolling :main tag with one rule.
          #
          # `:sha-<short>` is published on every run so the downstream
          # Container Image Security Scan workflow can pull a
          # deterministic, race-free tag for whatever commit triggered
          # this run (it resolves the upstream head_sha → short SHA →
          # `sha-<short>` tag).
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.image.title }}
            org.opencontainers.image.description=${{ matrix.image.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache backend — scoped per image so api/web
          # don't fight over the same cache key.
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          # Attestations off — enable when Bishop's signing workflow lands.
          provenance: false
          sbom: false
