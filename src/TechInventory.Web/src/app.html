<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!--
			F026: pinch-zoom intentionally disabled (user-scalable=no, maximum-scale=1)
			to eliminate the iOS PWA "scroll wobble" caused by accidental two-finger
			zoom while panning. Accessibility note: dynamic type / browser font scaling
			still works in standalone PWA mode, so WCAG 1.4.4 reflow is preserved.
		-->
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="description" content="Tech Inventory — Your household, catalogued." />
		<title>Tech Inventory</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" sizes="32x32" />
		<link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/icons/icon-180.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0071e3" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="TechInv" />
		<meta name="format-detection" content="telephone=no" />
		<!-- T08: pre-hydration theme script (FOUC suppression) -->
		<script>
			try {
				const preference = localStorage.getItem('theme-preference') || 'system';
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const resolvedTheme =
					preference === 'dark' || (preference !== 'light' && prefersDark) ? 'dark' : 'light';
				document.documentElement.dataset.theme = resolvedTheme;
				document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
