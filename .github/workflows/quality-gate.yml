name: Quality Gate
on:
  push: { branches: [main] }
  pull_request:
  schedule: [{ cron: '0 6 * * 1' }]  # Weekly audit

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }
      - run: dotnet restore
      - run: dotnet format --verify-no-changes
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage"
      - run: dotnet list package --vulnerable --include-transitive

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/TechInventory.Web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - run: corepack enable
      - uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('src/TechInventory.Web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      # Non-blocking for now: main currently carries ~110 pre-existing
      # svelte-check errors unrelated to any single change, so making this
      # step required would red-mark every PR on day one. It still runs and
      # surfaces new failures (e.g. #80's TypeScript 7 / svelte-check
      # incompatibility) in the PR checks UI; flip continue-on-error to
      # false once the existing backlog is cleared.
      - run: pnpm run check
        continue-on-error: true
      - run: pnpm run lint
      - run: pnpm run test -- --run
      - run: pnpm run build

  codeql:
    runs-on: ubuntu-latest
    # SARIF upload requires Code Scanning to be enabled in repo settings
    # (Settings → Code security → Code scanning → Set up). On private repos
    # this is a paid GHAS feature; keep CodeQL as a CI artifact until then
    # so the analysis runs without red-marking PRs on upload failure.
    permissions:
      contents: read           # actions/checkout needs this when permissions are scoped
      actions: read            # required by CodeQL on private repositories
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp,javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: codeql-results
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codeql-sarif
          path: codeql-results
          retention-days: 14

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read         # actions/checkout
      pull-requests: read    # gitleaks-action reads PR commits on pull_request events
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-config-scan:
    # Trivy CONFIG scan only — catches Dockerfile + Compose + IaC
    # misconfigurations on PR. The previous `scan-type: fs` was largely
    # redundant once we scan published images (see security-scan.yml,
    # which Trivy-scans the actual GHCR images on every release). Keeping
    # config-only here means Dockerfile regressions (e.g. running as root,
    # missing healthcheck, exposed secrets via ENV) still block at PR time.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: '1'

  sbom:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: anchore/sbom-action@v0
        with: { format: cyclonedx-json }
