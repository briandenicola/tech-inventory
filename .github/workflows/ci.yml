name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Build, Test, and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install pinned gitleaks
        run: bash ./scripts/install-gitleaks.sh

      - name: Run auth token and secret scan
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            node ./scripts/check-security.mjs --diff-range "FETCH_HEAD...HEAD"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            node ./scripts/check-security.mjs --diff-range "${{ github.sha }}^!"
          else
            node ./scripts/check-security.mjs --diff-range "${{ github.event.before }}..${{ github.sha }}"
          fi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('src/TechInventory.Web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Run verification pipeline
        run: ./scripts/verify.sh

      # TODO: Phase 3 — Add container build + push to GHCR
      # TODO: Phase 3 — Add SBOM generation (Syft or dotnet sbom)
      # TODO: Phase 3 — Add Trivy container security scan
