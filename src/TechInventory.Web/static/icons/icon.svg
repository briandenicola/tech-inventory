<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
	<title>Tech Inventory</title>
	<defs>
		<style>
			.primary { fill: #0071e3; }
			.neutral { fill: #ffffff; }
		</style>
	</defs>
	
	<!-- Rounded square container (maskable safe zone compliant) -->
	<rect class="primary" x="48" y="48" width="416" height="416" rx="104" />
	
	<!-- House silhouette (centered, pitched roof + body) -->
	<!-- Roof triangle -->
	<path class="neutral" d="M 160 176 L 256 96 L 352 176 Z" />
	
	<!-- House body -->
	<rect class="neutral" x="160" y="176" width="192" height="224" />
	
	<!-- Device grid inside house body (2x3 grid of small squares representing inventoried items) -->
	<!-- Row 1 -->
	<rect class="primary" x="184" y="200" width="32" height="32" rx="4" />
	<rect class="primary" x="240" y="200" width="32" height="32" rx="4" />
	<rect class="primary" x="296" y="200" width="32" height="32" rx="4" />
	
	<!-- Row 2 -->
	<rect class="primary" x="184" y="256" width="32" height="32" rx="4" />
	<rect class="primary" x="240" y="256" width="32" height="32" rx="4" />
	<rect class="primary" x="296" y="256" width="32" height="32" rx="4" />
	
	<!-- Row 3 -->
	<rect class="primary" x="184" y="312" width="32" height="32" rx="4" />
	<rect class="primary" x="240" y="312" width="32" height="32" rx="4" />
	<rect class="primary" x="296" y="312" width="32" height="32" rx="4" />
	
	<!-- Accent tile (bottom-right, slightly different opacity to suggest "active/tracked") -->
	<rect class="primary" x="296" y="356" width="32" height="32" rx="4" style="opacity: 0.6;" />
</svg>
